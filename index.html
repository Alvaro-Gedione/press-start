<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Start - Escola Ideal</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/index.css">
</head>

<body>

    <div class="parallax-container">
        <!-- SOL E LUA -->
        <div class="sun" id="sunIcon" title="Clique para alternar para noite 🌙"></div>
        <div class="moon" id="moonIcon" title="Clique para alternar para dia ☀️"></div>

        <!-- Estrelas geradas via JavaScript -->
        <div id="starsContainer"></div>

        <!-- Nuvens em posições diferentes -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>

        <!-- Chão de fundo (ground02.png - montanha) -->
        <div class="layer-ground-back" id="parallax-ground-back"></div>

        <img src="src/img/background/school.png" class="layer-school" id="parallax-school" alt="Escola">
        <img src="src/img/background/tree.png" class="layer-tree-1" id="parallax-tree1" alt="Árvore 1">
        <img src="src/img/background/tree.png" class="layer-tree-2" id="parallax-tree2" alt="Árvore 2">

        <!-- Camadas do chão -->
        <div class="layer-ground-mid" id="parallax-ground-mid"></div>
        <div class="layer-ground-front" id="parallax-ground-front"></div>
    </div>

    <!-- DIV ONDE A TOPBAR SERÁ CARREGADA -->
    <div id="topbar-container"></div>

    <main>
        <h1 class="main-title">Press Start: Escola Ideal</h1>

        <div class="cards-container">
            <a href="mySchool/game.html" class="card card-orange">
                <i class="fa-solid fa-gamepad"></i>
                <div class="card-content">
                    <div class="card-title">Joguinho</div>
                    <div class="card-subtitle">A escola dos sonhos</div>
                </div>
            </a>

            <a href="mySchool/history.html" class="card card-yellow">
                <i class="fa-solid fa-book-open"></i>
                <div class="card-content">
                    <div class="card-title">História</div>
                    <div class="card-subtitle">Nossa trajetória</div>
                </div>
            </a>

            <a href="mySchool/awards.html" class="card card-blue">
                <i class="fa-solid fa-trophy"></i>
                <div class="card-content">
                    <div class="card-title">Prêmios</div>
                    <div class="card-subtitle">Reconhecimentos</div>
                </div>
            </a>
        </div>
    </main>

    <!-- ========================================= -->
    <!-- ASSISTENTE (adicionado)                   -->
    <!-- ========================================= -->

    <!-- Botão de ajuda/assistente -->
    <div class="help-emoji" id="helpEmojiBtn">
        <i class="fas fa-ellipsis-h"></i>
    </div>

    <!-- Toast para mensagens -->
    <div id="magicToast" class="magic-toast">
        <i class="fas fa-magic"></i>
        <span id="toastMessage">✨ Mensagem mágica!</span>
    </div>

    <!-- Container do assistente -->
    <div class="assistant-wrapper" id="assistantContainer">
        <div class="speech-bubble" id="bubbleText">
            Oi! Eu sou sua Prof. Clique em mim para conversarmos! 📖
        </div>
        <img src="src/img/Assistente00.png" alt="Assistente" class="assistant-char-img" id="assistantImage"
            onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23FFD700\' /%3E%3Ccircle cx=\'35\' cy=\'40\' r=\'5\' fill=\'black\'/%3E%3Ccircle cx=\'65\' cy=\'40\' r=\'5\' fill=\'black\'/%3E%3Cpath d=\'M30 65 Q50 80,70 65\' stroke=\'black\' stroke-width=\'5\' fill=\'none\' /%3E%3C/svg%3E'">
    </div>

    <!-- Scripts do assistente -->
    <script src="./src/config.js"></script>
    <script src="./src/assistent.js"></script>

    <script>
        // Função para carregar a topbar
        function loadTopbar() {
            fetch('topbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('topbar-container').innerHTML = data;
                    setTimeout(() => {
                        initTopbarEvents();
                        initMobileMenu();
                    }, 100);
                })
                .catch(error => console.error('Erro ao carregar a topbar:', error));
        }

        // Função para mostrar toast
        function showToastMessage(message) {
            const toast = document.getElementById('magicToast');
            const toastMessage = document.getElementById('toastMessage');
            if (toast && toastMessage) {
                toastMessage.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }

        // Função para alternar tema (GLOBAL)
        window.toggleTheme = function () {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const mobileThemeToggle = document.getElementById('mobileThemeToggle');

            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');

            if (themeToggle) {
                themeToggle.classList.remove('fa-sun', 'fa-moon');
                themeToggle.classList.add(isDark ? 'fa-moon' : 'fa-sun');
            }
            if (mobileThemeToggle) {
                mobileThemeToggle.classList.remove('fa-sun', 'fa-moon');
                mobileThemeToggle.classList.add(isDark ? 'fa-moon' : 'fa-sun');
            }

            const message = isDark ? '🌙 Boa noite! A lua está linda hoje! ✨' : '☀️ Bom dia! O sol está radiante! 🌈';
            showToastMessage(message);
        };

        // Inicializar eventos da topbar
        function initTopbarEvents() {
            const themeToggle = document.getElementById('themeToggle');
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            const body = document.body;

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.toggleTheme();
                });
            }

            if (sunIcon) {
                sunIcon.addEventListener('click', () => {
                    if (body.classList.contains('dark-mode')) {
                        window.toggleTheme();
                    } else {
                        showToastMessage('☀️ Já estamos durante o dia! Clique na lua para virar noite 🌙');
                    }
                });
            }

            if (moonIcon) {
                moonIcon.addEventListener('click', () => {
                    if (!body.classList.contains('dark-mode')) {
                        window.toggleTheme();
                    } else {
                        showToastMessage('🌙 Já é noite! Clique no sol para amanhecer ☀️');
                    }
                });
            }

            // Clique no user badge
            document.querySelectorAll('.user-badge').forEach(badge => {
                badge.addEventListener('click', function (e) {
                    if (e.target.closest('#themeToggle') || e.target.closest('#mobileThemeToggle')) {
                        return;
                    }
                    showToastMessage('✨ Olá, amiguinho! ✨');
                });
            });

            // Logo responsiva
            const logoImg = document.getElementById('logo-img');
            if (logoImg) {
                function updateLogoResponsive() {
                    if (window.innerWidth <= 500) {
                        logoImg.style.height = '80px';
                        logoImg.src = 'src/img/logo02.png';
                    } else if (window.innerWidth <= 768) {
                        logoImg.style.height = '50px';
                        logoImg.src = 'src/img/logo.png';
                    } else {
                        logoImg.style.height = '67.5px';
                        logoImg.src = 'src/img/logo.png';
                    }
                }
                window.addEventListener('resize', updateLogoResponsive);
                updateLogoResponsive();
            }
        }

        // Inicializar menu mobile (CORRIGIDO)
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggleBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            const closeMenuBtn = document.getElementById('closeMenuBtn');

            console.log('Menu elements:', { menuToggle, mobileMenu, menuOverlay, closeMenuBtn }); // Debug

            function openMenu() {
                console.log('Opening menu');
                if (mobileMenu) mobileMenu.classList.add('active');
                if (menuOverlay) menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeMenu() {
                console.log('Closing menu');
                if (mobileMenu) mobileMenu.classList.remove('active');
                if (menuOverlay) menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (menuToggle) {
                menuToggle.removeEventListener('click', openMenu);
                menuToggle.addEventListener('click', openMenu);
            } else {
                console.error('menuToggleBtn não encontrado!');
            }

            if (closeMenuBtn) {
                closeMenuBtn.removeEventListener('click', closeMenu);
                closeMenuBtn.addEventListener('click', closeMenu);
            }

            if (menuOverlay) {
                menuOverlay.removeEventListener('click', closeMenu);
                menuOverlay.addEventListener('click', closeMenu);
            }

            // Links do menu mobile
            document.querySelectorAll('.mobile-nav .nav-btn').forEach(link => {
                link.removeEventListener('click', handleMobileLinkClick);
                link.addEventListener('click', handleMobileLinkClick);
            });

            function handleMobileLinkClick(e) {
                const href = link.getAttribute('href');
                closeMenu();
                if (href === '#') {
                    e.preventDefault();
                    showToastMessage('📖 Em breve mais novidades!');
                }
            }

            // Theme toggle mobile
            const mobileThemeToggle = document.getElementById('mobileThemeToggle');
            if (mobileThemeToggle) {
                mobileThemeToggle.removeEventListener('click', handleMobileThemeToggle);
                mobileThemeToggle.addEventListener('click', handleMobileThemeToggle);
            }

            function handleMobileThemeToggle(e) {
                e.stopPropagation();
                window.toggleTheme();
                closeMenu();
            }
        }

        // Gerar estrelas
        function generateStars() {
            const starsContainer = document.getElementById('starsContainer');
            if (!starsContainer) return;
            starsContainer.innerHTML = '';
            const numberOfStars = 100;
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.setProperty('--star-opacity', Math.random() * 0.5 + 0.3);
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Parallax
        const school = document.getElementById('parallax-school');
        const tree1 = document.getElementById('parallax-tree1');
        const tree2 = document.getElementById('parallax-tree2');
        const groundBack = document.getElementById('parallax-ground-back');
        const groundMid = document.getElementById('parallax-ground-mid');
        const groundFront = document.getElementById('parallax-ground-front');

        if (school && tree1 && tree2 && groundBack && groundMid && groundFront) {
            window.addEventListener('scroll', () => {
                let scrollY = window.scrollY;
                school.style.transform = `translateY(${scrollY * -0.08}px)`;
                tree1.style.transform = `translateY(${scrollY * -0.15}px)`;
                tree2.style.transform = `translateY(${scrollY * -0.12}px)`;
                groundBack.style.transform = `translateY(${scrollY * -0.05}px)`;
                groundMid.style.transform = `translateY(${scrollY * -0.08}px)`;
                groundFront.style.transform = `translateY(${scrollY * -0.15}px)`;
            });
        }

        // Folhas caindo
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            const size = Math.random() * 20 + 15;
            leaf.style.width = `${size}px`;
            leaf.style.height = `${size}px`;
            leaf.style.left = `${Math.random() * 100}%`;
            const duration = Math.random() * 12 + 8;
            const animationType = Math.floor(Math.random() * 3) + 1;
            let animation = animationType === 1 ? 'fallLeaf1' : animationType === 2 ? 'fallLeaf2' : 'fallLeaf3';
            leaf.style.animation = `${animation} ${duration}s linear infinite`;
            leaf.style.animationDelay = `${Math.random() * -20}s`;
            leaf.style.opacity = Math.random() * 0.5 + 0.3;
            return leaf;
        }

        const parallaxContainer = document.querySelector('.parallax-container');
        if (parallaxContainer) {
            for (let i = 0; i < 30; i++) {
                parallaxContainer.appendChild(createLeaf());
            }
            setInterval(() => {
                const leaves = document.querySelectorAll('.leaf');
                if (leaves.length < 25) {
                    parallaxContainer.appendChild(createLeaf());
                }
            }, 5000);
        }

        // Confetti
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            const colors = ['#FF69B4', '#FFD700', '#87CEEB', '#6FCF97', '#B983FF'];
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            confetti.style.width = (Math.random() * 10 + 5) + 'px';
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }

        // Cards
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.preventDefault();
                for (let i = 0; i < 10; i++) createConfetti();
                showToastMessage('🎉 Boa escolha! Vamos explorar!');
                setTimeout(() => window.location.href = card.getAttribute('href'), 500);
            });
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', function () {
            loadTopbar();
            generateStars();

            setTimeout(() => showToastMessage('🌈 Bem-vindo ao Press Start!'), 1500);
            setTimeout(() => showToastMessage('🎮 Clique no menu ☰ para navegar!'), 4000);
        });

        window.showToast = showToastMessage;
    </script>
</body>

</html>
